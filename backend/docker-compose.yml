services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: citycast
      POSTGRES_PASSWORD: citycast
      POSTGRES_DB: citycast
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citycast"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://citycast:citycast@postgres:5432/citycast
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-citycast-audio}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_SIGNING_SECRET: ${S3_SIGNING_SECRET:-dev-signing-secret}
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:19006,http://localhost:8081
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
