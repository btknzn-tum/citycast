services:
  devcontainer:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: sleep infinity
    working_dir: /workspaces/citycast
    volumes:
      - ..:/workspaces/citycast:cached
    environment:
      DATABASE_URL: postgresql+asyncpg://citycast:citycast@postgres:5432/citycast
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-citycast-audio}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_SIGNING_SECRET: ${S3_SIGNING_SECRET:-dev-signing-secret}
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:19006,http://localhost:8081
      PORTAL_PASSWORD: ${PORTAL_PASSWORD:-dev}
      PORTAL_ALLOWED_IPS: ${PORTAL_ALLOWED_IPS:-0.0.0.0/0}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-studio@localhost}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: citycast
      POSTGRES_PASSWORD: citycast
      POSTGRES_DB: citycast
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citycast"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
