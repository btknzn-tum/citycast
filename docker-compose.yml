##############################################
# citycast — Unified Dev Environment
#
# Usage:
#   docker compose up        → starts all services
#   docker compose up -d     → starts in background
#   docker compose down      → stops everything
#   docker compose logs -f   → follow all logs
#
# Services:
#   postgres    → internal:5432  (use VS Code port forwarding if needed)
#   backend     → localhost:8000  (FastAPI, hot-reload)
#   studio      → localhost:8010  (Portal, hot-reload)
#   web         → localhost:1911  (Vite, hot-reload)
#
# Note: frontend/mobile (Expo) runs on host Mac
#        (needs device/simulator access)
##############################################

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: citycast
      POSTGRES_PASSWORD: citycast
      POSTGRES_DB: citycast
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citycast"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /citycast/backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://citycast:citycast@postgres:5432/citycast
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-citycast-audio}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_SIGNING_SECRET: ${S3_SIGNING_SECRET:-dev-signing-secret}
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:19006,http://localhost:8081
    volumes:
      - ./:/citycast
    depends_on:
      postgres:
        condition: service_healthy

  studio:
    build:
      context: ./studio
      dockerfile: Dockerfile
    working_dir: /citycast/studio
    ports:
      - "8010:8010"
    environment:
      DATABASE_URL: postgresql+asyncpg://citycast:citycast@postgres:5432/citycast
      PORTAL_PASSWORD: ${PORTAL_PASSWORD:-dev}
      PORTAL_ALLOWED_IPS: ${PORTAL_ALLOWED_IPS:-0.0.0.0/0}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-studio@localhost}
    volumes:
      - ./:/citycast
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
    working_dir: /citycast/frontend/web
    ports:
      - "1911:1911"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./:/citycast
      - /citycast/frontend/web/node_modules

volumes:
  postgres_data:
